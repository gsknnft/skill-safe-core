name: skill-safe CI

on:
  pull_request:
  push:
    branches:
      - main
      - "dev/**"

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm tsc:noemit

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Validate mappings
        run: pnpm validate:mappings

      - name: Validate rule fixtures
        run: pnpm validate:rules

      - name: Example batch scan
        run: pnpm example:batch

      - name: Pack dry-run
        run: pnpm pack --dry-run
