name: skill-safe Publish

# Triggers on a signed tag push matching the version pattern.
# Run locally: git tag -s v0.3.0 -m "v0.3.0" && git push origin v0.3.0
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "skill-safe-v[0-9]+.[0-9]+.[0-9]+"

# OIDC token required for npm provenance attestation.
# No long-lived NPM_TOKEN is stored — OIDC mint is scoped to this job run.
permissions:
  contents: read
  id-token: write   # required for npm --provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git verify-tag

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # ── Pre-publish gate ──────────────────────────────────────────────────

      - name: Typecheck
        run: pnpm tsc:noemit

      - name: Test
        run: pnpm test

      - name: Validate governance mappings
        run: pnpm validate:mappings

      - name: Dependency audit
        run: pnpm audit --prod --audit-level high

      - name: Build
        run: pnpm build

      - name: Pack dry-run (surface check)
        run: |
          pnpm pack --dry-run 2>&1 | tee pack-contents.txt
          grep -q "dist/cli.js" pack-contents.txt || (echo "ERROR: dist/cli.js missing from tarball" && exit 1)
          grep -q "tests/" pack-contents.txt && (echo "ERROR: tests/ in tarball" && exit 1) || true
          echo "Tarball surface OK."

      - name: Confirm zero runtime dependencies
        run: |
          count=$(node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf8'));
            console.log(Object.keys(pkg.dependencies ?? {}).length);
          ")
          [ "$count" -eq 0 ] || (echo "ERROR: $count runtime dep(s) found" && exit 1)
          echo "Zero runtime dependencies confirmed."

      # ── Publish with provenance ───────────────────────────────────────────

      - name: Publish
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
